<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisiomasso - Agenda da Equipe</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
    <link rel="shortcut icon" href="assets/favicon.svg" type="image/x-icon">

    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: { inter: ['Inter', 'sans-serif'] },
              colors: { 
                primary: '#0092B8', 
                secondary: '#005F78',
                success: '#22C55E',
                danger: '#FF4D4D'
              }
            }
          }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; color: #1E293B; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: #0092B8; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .table-row-hover:hover { background-color: #F1F5F9; }
        .bg-occupied { background-color: rgba(0, 146, 184, 0.03); }
        
        .btn-hover { transition: all 0.2s ease; cursor: pointer; }
        .btn-hover:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-hover:active { transform: translateY(0); }
    </style>
</head>
<body class="min-h-screen">

<div id="loginArea" class="fixed inset-0 bg-secondary/90 backdrop-blur-xl flex justify-center items-center z-[100] px-4">
    <div class="bg-white w-full max-w-[400px] p-10 rounded-[40px] shadow-2xl text-center">
        <div class="mb-8">
            <div class="w-20 h-20 bg-primary/10 rounded-3xl flex items-center justify-center mx-auto mb-4">
                <i class="ph ph-identification-card text-4xl text-primary"></i>
            </div>
            <h1 class="text-2xl font-800 text-secondary tracking-tight uppercase">Acesso Equipe</h1>
        </div>
        <div class="space-y-4 text-left">
            <div>
                <label for="email" class="text-[10px] font-800 text-gray-400 uppercase ml-2 mb-1 block">E-mail</label>
                <input id="email" name="email" type="email" autocomplete="username" placeholder="seu@email.com" class="w-full rounded-2xl px-5 py-4 border border-gray-100 bg-gray-50 outline-none focus:ring-2 ring-primary/20">
            </div>
            <div>
                <label for="password" class="text-[10px] font-800 text-gray-400 uppercase ml-2 mb-1 block">Senha</label>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" class="w-full rounded-2xl px-5 py-4 border border-gray-100 bg-gray-50 outline-none focus:ring-2 ring-primary/20">
            </div>
            <button id="loginBtn" class="w-full bg-primary btn-hover text-white py-4 rounded-2xl font-bold shadow-lg shadow-primary/30 uppercase tracking-widest text-sm">Entrar no Painel</button>
        </div>
        <p id="loginError" class="text-danger mt-4 text-xs font-semibold"></p>
    </div>
</div>

<div id="agendaArea" class="hidden">
    <header class="w-full bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto h-20 flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <img src="assets/favicon.svg" alt="Logo Fisiomasso" class="h-10 w-auto">
                <span class="font-800 text-secondary text-xl tracking-tighter uppercase">FISIOMASSO</span>
            </div>
            <button id="logoutBtn" class="group flex items-center gap-2 text-gray-400 hover:text-danger font-bold text-xs uppercase tracking-widest transition-all">
                Sair <i class="ph ph-power text-lg group-hover:rotate-90"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="bg-white p-6 rounded-[32px] border border-gray-100 card-shadow flex flex-col md:flex-row gap-4 mb-8">
            <div class="flex-1">
                <label for="funcionario" class="text-[10px] font-800 text-gray-400 uppercase ml-2 mb-1 block">Profissional</label>
                <select id="funcionario" name="funcionario" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-secondary outline-none cursor-pointer hover:bg-gray-100 transition-colors"></select>
            </div>
            <div class="flex-1">
                <label for="data" class="text-[10px] font-800 text-gray-400 uppercase ml-2 mb-1 block">Data Selecionada</label>
                <input type="date" id="data" name="data" class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-secondary outline-none hover:bg-gray-100 transition-colors">
            </div>
        </div>

        <div class="bg-white rounded-[32px] border border-gray-100 card-shadow overflow-hidden fade-in">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100">
                            <th class="px-6 py-5 text-[10px] font-900 text-gray-400 uppercase tracking-widest w-24">Hora</th>
                            <th class="px-6 py-5 text-[10px] font-900 text-gray-400 uppercase tracking-widest">Paciente</th>
                            <th class="px-6 py-5 text-[10px] font-900 text-gray-400 uppercase tracking-widest hidden md:table-cell">Serviço</th>
                            <th class="px-6 py-5 text-[10px] font-900 text-gray-400 uppercase tracking-widest text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="agendaTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCWJZiUilkri_oCN4rLvmqFV5H_GhvEd6E",
    authDomain: "fisioterapia-agendamento.firebaseapp.com",
    projectId: "fisioterapia-agendamento",
    storageBucket: "fisioterapia-agendamento.appspot.com",
    messagingSenderId: "928899499645",
    appId: "1:928899499645:web:e86a365a71c85f845c1314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginArea = document.getElementById("loginArea");
const agendaArea = document.getElementById("agendaArea");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const funcionarioSelect = document.getElementById("funcionario");
const dataInput = document.getElementById("data");
const tableBody = document.getElementById("agendaTableBody");

let agendamentos = [];
let unsubscribe = null;

dataInput.valueAsDate = new Date();

loginBtn.addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
        await signInWithEmailAndPassword(auth, email, password);
    } catch {
        document.getElementById("loginError").innerText = "E-mail ou senha inválidos";
    }
});

logoutBtn.addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        if (unsubscribe) unsubscribe();
        loginArea.classList.remove("hidden");
        agendaArea.classList.add("hidden");
        return;
    }
    
    const adminSnap = await getDocs(collection(db,"admins"));
    const isAdmin = adminSnap.docs.find(d=>d.id===user.uid);

    if(!isAdmin){
        alert("Acesso exclusivo para equipe Fisiomasso.");
        await signOut(auth);
        return;
    }

    loginArea.classList.add("hidden");
    agendaArea.classList.remove("hidden");
    carregarFuncionarios();
    carregarAgendamentos();
});

async function carregarFuncionarios() {
    const snap = await getDocs(collection(db,"funcionarios"));
    funcionarioSelect.innerHTML = snap.docs.map(d =>
        `<option value="${d.data().nome}">${d.data().nome}</option>`
    ).join('');
    renderAgenda(); 
}

function carregarAgendamentos(){
    if(unsubscribe) unsubscribe();
    unsubscribe = onSnapshot(collection(db,"agendamentos"), snap=>{
        agendamentos = snap.docs.map(d=>({id:d.id,...d.data()}));
        renderAgenda();
    });
}

function renderAgenda(){
    if (!dataInput.value || !funcionarioSelect.value) return;

    const funcionario = funcionarioSelect.value.trim().toLowerCase();
    const data = dataInput.value;
    const dataLocal = new Date(data+"T00:00");
    const sexta = dataLocal.getDay()===5;

    const horarios = sexta ?
    ["08:00","09:00","10:00","11:00","15:00","16:00","17:00","18:00"] :
    ["08:00","09:00","10:00","11:00","15:00","16:00","17:00","18:00","19:00"];

    tableBody.innerHTML = "";

    horarios.forEach(horario=>{
        const ag = agendamentos.find(a=>
            a.funcionario?.trim().toLowerCase()===funcionario &&
            a.data===data &&
            a.horario===horario &&
            a.status==="confirmado"
        );

        const row = document.createElement("tr");
        row.className = `border-b border-gray-50 table-row-hover transition-colors ${ag ? 'bg-occupied' : ''}`;

        row.innerHTML = `
            <td class="px-6 py-4">
                <span class="text-sm font-800 text-secondary">${horario}</span>
            </td>
            <td class="px-6 py-4">
                ${ag ? `
                    <div class="flex flex-col">
                        <span class="text-sm font-800 text-secondary uppercase">${ag.nomeAdmin || 'Paciente'}</span>
                        <span class="text-[10px] text-primary font-bold md:hidden">${ag.servicoAdmin || 'Serviço'}</span>
                    </div>
                ` : `
                    <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Livre</span>
                `}
            </td>
            <td class="px-6 py-4 hidden md:table-cell">
                ${ag ? `<span class="text-xs font-semibold text-gray-500 uppercase">${ag.servicoAdmin || 'Geral'}</span>` : '-'}
            </td>
            <td class="px-6 py-4">
                <div class="flex justify-center gap-2">
                    ${ag ? `
                        <button onclick="window.concluir('${ag.id}')" title="Finalizar Atendimento"
                            class="bg-primary text-white p-2.5 rounded-xl btn-hover shadow-sm">
                            <i class="ph ph-check-circle text-lg"></i>
                        </button>
                        <a href="https://wa.me/${ag.whatsappAdmin?.replace(/\D/g,'')}" target="_blank" title="Chamar no WhatsApp"
                            class="bg-success text-white p-2.5 rounded-xl btn-hover shadow-sm">
                            <i class="ph ph-whatsapp-logo text-lg"></i>
                        </a>
                    ` : `
                        <i class="ph ph-calendar-blank text-gray-200 text-xl"></i>
                    `}
                </div>
            </td>
        `;
        tableBody.appendChild(row);
    });
}

window.concluir = async function(id){
    if(confirm("Deseja finalizar este atendimento?")){
        await updateDoc(doc(db,"agendamentos",id), { status: "finalizado" });
    }
};

funcionarioSelect.addEventListener("change",renderAgenda);
dataInput.addEventListener("change",renderAgenda);
</script>
</body>
</html>
