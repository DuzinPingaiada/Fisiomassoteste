<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Funcionário - Fisiomasso</title>

<link rel="shortcut icon" href="assets/favicon.svg" type="image/x-icon">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(99,102,241,0.15), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(16,185,129,0.12), transparent 40%),
    linear-gradient(to bottom right,#0f172a,#020617);
  background-attachment: fixed;
  color:white;
}

::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{
  background:linear-gradient(to bottom,#334155,#1e293b);
  border-radius:10px;
}

.glass{
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

input, select{
  background:#f1f5f9;
  color:#000;
}
</style>
</head>

<body class="p-6 md:p-12">

<div id="loginArea" class="fixed inset-0 bg-black/70 backdrop-blur-xl flex justify-center items-center z-50">

  <div class="glass w-[400px] p-10 rounded-3xl">

    <h2 class="text-3xl font-bold mb-6 text-center text-white">
      Painel Funcionário
    </h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full rounded-xl px-4 py-3 mb-4 text-black"
      autocomplete="email">

    <input id="password" type="password" placeholder="Senha"
      class="w-full rounded-xl px-4 py-3 mb-5 text-black"
      autocomplete="current-password">

    <button id="loginBtn"
      class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:scale-[1.03] text-white py-3 rounded-xl font-semibold flex justify-center items-center gap-2 transition">
      <i class="fas fa-right-to-bracket"></i> Entrar
    </button>

    <p id="loginError" class="text-red-400 mt-4 text-sm text-center"></p>

  </div>
</div>

<div id="agendaArea" class="hidden max-w-7xl mx-auto pt-10">

  <div class="flex justify-between items-center mb-10 flex-wrap gap-4">
    <h1 class="text-4xl font-bold flex items-center gap-3">
      <i class="fas fa-calendar-days text-indigo-400"></i>
      Agenda Funcionário
    </h1>

    <button id="logoutBtn"
      class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-xl shadow-lg transition flex items-center gap-2">
      <i class="fas fa-arrow-right-from-bracket"></i> Sair
    </button>
  </div>

  <div class="glass p-6 rounded-3xl mb-10 grid md:grid-cols-2 gap-6">

    <select id="funcionario" class="rounded-xl px-4 py-3 text-black"></select>

    <input type="date" id="data" class="rounded-xl px-4 py-3 text-black">

  </div>

  <div id="agenda"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCWJZiUilkri_oCN4rLvmqFV5H_GhvEd6E",
  authDomain: "fisioterapia-agendamento.firebaseapp.com",
  projectId: "fisioterapia-agendamento",
  storageBucket: "fisioterapia-agendamento.appspot.com",
  messagingSenderId: "928899499645",
  appId: "1:928899499645:web:e86a365a71c85f845c1314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


const loginArea = document.getElementById("loginArea");
const agendaArea = document.getElementById("agendaArea");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

const funcionarioSelect = document.getElementById("funcionario");
const dataInput = document.getElementById("data");
const agendaDiv = document.getElementById("agenda");

let agendamentos = [];
let unsubscribe = null;

dataInput.valueAsDate = new Date();

loginBtn.addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch {
    document.getElementById("loginError").innerText = "Email ou senha inválidos";
  }
});

logoutBtn.addEventListener("click", async () => {
  await signOut(auth);
});

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    if (unsubscribe) unsubscribe();
    loginArea.classList.remove("hidden");
    agendaArea.classList.add("hidden");
    return;
  }

  const adminSnap = await getDocs(collection(db,"admins"));
  const isAdmin = adminSnap.docs.find(d=>d.id===user.uid);

  if(!isAdmin){
    alert("Sem permissão.");
    await signOut(auth);
    return;
  }

  loginArea.classList.add("hidden");
  agendaArea.classList.remove("hidden");

  carregarFuncionarios();
  carregarAgendamentos();
});


async function carregarFuncionarios() {
  const snap = await getDocs(collection(db,"funcionarios"));
  funcionarioSelect.innerHTML = snap.docs.map(d =>
    `<option value="${d.data().nome}">${d.data().nome}</option>`
  ).join('');
}

function carregarAgendamentos(){
  if(unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(collection(db,"agendamentos"), snap=>{
    agendamentos = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAgenda();
  });
}

function renderAgenda(){

  if (!dataInput.value || !funcionarioSelect.value) {
    agendaDiv.innerHTML = "";
    return;
  }

  const funcionario = funcionarioSelect.value.trim().toLowerCase();
  const data = dataInput.value;

  const dataLocal = new Date(data+"T00:00");
  const sexta = dataLocal.getDay()===5;

  const horarios = sexta ?
  ["08:00","09:00","10:00","11:00","15:00","16:00","17:00","18:00"] :
  ["08:00","09:00","10:00","11:00","15:00","16:00","17:00","18:00","19:00"];

  agendaDiv.innerHTML = `
    <div class="glass rounded-3xl overflow-hidden">
      <div id="agendaGrid"></div>
    </div>
  `;

  const grid = document.getElementById("agendaGrid");

  horarios.forEach(horario=>{

    const ag = agendamentos.find(a=>
      a.funcionario?.trim().toLowerCase()===funcionario &&
      a.data===data &&
      a.horario===horario &&
      a.status==="confirmado"
    );

    const row = document.createElement("div");
    row.className = "grid md:grid-cols-[120px_1fr] border-t border-white/10";

    row.innerHTML = `
      <div class="p-6 font-bold text-slate-400 bg-black/20">${horario}</div>
      <div class="p-6">
        ${ag ? `
        <div class="bg-red-700 p-6 rounded-2xl flex justify-between items-center">
          <div>
            <p class="font-bold text-lg">${ag.nomeCompleto}</p>
            <p class="text-red-200 text-sm">${ag.servico}</p>
          </div>
          <button onclick="window.concluir('${ag.id}')"
            class="bg-black/40 px-4 py-2 rounded-xl">
            Finalizado
          </button>
        </div>`
        :
        `<div class="bg-green-600 p-6 rounded-2xl text-center font-semibold">
          Disponível
        </div>`}
      </div>
    `;

    grid.appendChild(row);
  });
}

window.concluir = async function(id){
  await deleteDoc(doc(db,"agendamentos",id));
};

funcionarioSelect.addEventListener("change",renderAgenda);
dataInput.addEventListener("change",renderAgenda);

</script>
</body>
</html>
